name: Publish

# Publishes @whisperr/wizard to npm when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Auth: npm Trusted Publishing (OIDC) — NO stored token. Before the first
# publish, configure a Trusted Publisher for @whisperr/wizard on npmjs.com
# (package Settings → Publishing access → GitHub Actions: repo
# WhisperrAI/whisperr-wizard, workflow publish.yml, environment production).
# Publishes with provenance attestations (requires a public repo).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing + provenance needs a recent npm (>= 11.5.1).
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      # publishConfig.access=public in package.json makes this publish publicly.
      - run: npm publish --provenance
